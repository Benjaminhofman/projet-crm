<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Suivi Liasse</title>
<link rel="stylesheet" href="decl-shared.css">
</head>
<body>

<div class="header">

<div class="counter" id="counter"></div>

<div class="filters-top">
    <input id="filter-assistant" placeholder="Assistant...">

<table>

    <th>Code</th><th>Nom</th><th>Assistant</th><th>Collaborateur</th><th>Année</th><th>Clôture</th>
</tr></thead>

<script src="utils.js"></script>
<script src="decl-engine.js"></script>
<script>
initDeclaratifPage({
    titre: "Suivi Liasse",
    emoji: "📊",
    filterField: "liasse",
    columns: [
        { header: "EDI Liasse",  field: "edi liasse",      type: "checkbox" },
        { header: "2069 RCI",    field: "2069 RCI Liasse",  type: "checkbox" },
        { header: "2067",        field: "2067 liasse",      type: "checkbox" },
        { header: "Dividendes",  field: "dividendes" },
        { header: "Prépa PV AG", field: "prepa PV AG",      type: "checkbox" }
    ]
});

</body>
</html>
