<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CRM Clients</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
    margin: 0;
}

.header {
    background: #273c75;
    color: white;
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header input {
    padding: 8px;
    border-radius: 6px;
    border: none;
    width: 250px;
}

.container {
    padding: 20px;
}

#alert-anniv {
    display:none;
    background:#ffeaa7;
    border-left:6px solid #e17055;
    padding:10px;
    margin-bottom:15px;
    border-radius:6px;
    font-weight:bold;
}

.dashboard {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    min-width: 180px;
    text-align: center;
}

.filters-container {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 15px;
    margin-bottom: 20px;
}

.filter-group {
    background: white;
    padding: 10px;
    border-radius: 8px;
}

.checkbox-list {
    height: 120px;
    overflow-y: auto;
    background: #f1f2f6;
    padding: 5px;
    border-radius: 5px;
}

.checkbox-list label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    padding: 4px;
}

.sortable {
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.arrow {
    margin-left: 5px;
    font-size: 12px;
}

.btn-anniv {
    background: #e67e22;
    color: white;
    padding: 8px 12px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.2s;
}

.btn-anniv:hover {
    background: #d35400;
}

table {
    border-collapse: collapse;
    width: 100%;
    background: white;
}

th {
    background: #273c75;
    color: white;
    padding: 10px;
    cursor: pointer;
}

td {
    padding: 10px;
}

tr:nth-child(even) {
    background: #f8f9fc;
}

tr:hover {
    background: #e8f0fe;
    cursor: pointer;
}

.btn {
    background: #44bd32;
    border: none;
    padding: 6px 10px;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.btn:hover {
    background: #2ecc71;
}

.alert {
    color: #e74c3c;
    font-weight: bold;
    margin-left: 5px;
}

.alert-badge {
    background: #ffeaea;
    color: #e74c3c;
    padding: 2px 6px;
    border-radius: 6px;
    font-size: 11px;
    margin-left: 5px;
}

/* --- AJOUT : modal édition rentabilité --- */
.renta-click {
    background: none;
    border: none;
    padding: 0;
    font: inherit;
    font-weight: bold;
    cursor: pointer;
    text-decoration: underline;
}

dialog {
    border: none;
    border-radius: 10px;
    width: min(720px, 95vw);
    padding: 20px;
}

.modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 12px 0;
}

.modal-grid label {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 14px;
}

.modal-grid input {
    padding: 8px;
    border: 1px solid #dcdde1;
    border-radius: 6px;
}

.calc-box {
    background: #f1f7ff;
    border: 1px solid #cfe3ff;
    border-radius: 8px;
    padding: 10px;
    margin: 12px 0;
    white-space: pre-line;
    font-size: 14px;
}

.modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
}
</style>
</head>

<body>

<div class="header">
    <h2>📊 CRM Clients</h2>

    <div style="display:flex; gap:10px; align-items:center;">
        <a href="declaratif.html" class="btn" style="background:#e67e22;">📑 Déclaratif</a>
        <a href="missions.html" class="btn" style="background:#8e44ad;">🚀 Missions exceptionnelles</a>
        <a href="opportunites.html" class="btn" style="background:#2980b9;">🎯 Suivi opportunités</a>
        <a href="commercial.html" class="btn" style="background:#16a085;">💰 Suivi commercial</a>
        <a href="anniversaires.html" class="btn-anniv">🎂 Anniversaires</a>

        <input type="text" id="search" placeholder="🔍 Rechercher un client...">
        <input type="number" id="filter-renta" placeholder="Min /10" style="width:120px;">
    </div>
</div>

<div class="container">

<div id="alert-anniv"></div>

<div class="dashboard">
    <div class="card">
        <h4>👥 Clients</h4>
        <p id="total-clients">0</p>
    </div>

    <div class="card">
        <h4>💰 Honos moyen</h4>
        <p id="avg-honos">0 €</p>
    </div>

    <div class="card">
        <button class="btn" onclick="sortByHonos()">📊 Top honoraires</button>
    </div>
</div>

<div class="filters-container" id="filters"></div>

<table>
<thead>
<tr>
<th>Code</th>
<th>Nom</th>
<th>Clôture</th>
<th>Structure</th>
<th>Ancienneté</th>
<th>Honos</th>
<th>Collab</th>
<th>Assistant</th>
<th onclick="sortByCA()">CA 🔽</th>

<th onclick="sortByResultat()">
    Résultat <span class="arrow">🔽</span>
</th>

<th>Activité</th>

<th onclick="sortByRentabilite()">Rentabilité 🔽</th>

<th>Action</th>
</tr>
</thead>

<tbody id="clients-table"></tbody>
</table>

</div>

<!-- AJOUT : modale édition -->
<dialog id="edit-renta-dialog">
    <h3 id="edit-renta-title">Modifier le rendement</h3>

    <div class="modal-grid">
        <label>Temps passé (h)
            <input id="edit-temps-passe" type="number" min="0" step="0.1">
        </label>

        <label>Honoraires cpta (€)
            <input id="edit-honos" type="number" step="0.01">
        </label>

        <label>Résultat R (€)
            <input id="edit-resultat" type="number" step="0.01">
        </label>

        <label>Ancienneté (ans)
            <input id="edit-anciennete" type="number" min="0" step="0.1">
        </label>
    </div>

    <div id="edit-renta-info" class="calc-box"></div>

    <div class="modal-actions">
        <button class="btn" style="background:#7f8c8d" onclick="closeRentaModal()">Annuler</button>
        <button class="btn" onclick="saveRentaEdit()">Enregistrer</button>
    </div>
</dialog>

<script src="utils.js"></script>
<script>
let clientsData = [];
let editingClientId = null;

/* 🔥 RENTABILITE */
function getRentabiliteScore(val) {
    const v = parseFloat(val) || 0;
    return Math.min((v / 100) * 10, 10);
}

function getColor(score) {
    if (score < 4) return "#e74c3c";
    if (score < 7) return "#f39c12";
    return "#27ae60";
}

/* 🔥 Outils calcul rendement */
function parseNum(v) {
    if (v === null || v === undefined || v === "") return 0;
    const n = parseFloat(String(v).replace(",", "."));
    return isNaN(n) ? 0 : n;
}

function calcRendement(temps, honos, resultat, anciennete) {
    if (temps <= 0) return 0;
    return ((honos + resultat) / temps) * (1 + anciennete * 0.02);
}

function refreshRentaInfo() {
    const temps = parseNum(document.getElementById("edit-temps-passe").value);
    const honos = parseNum(document.getElementById("edit-honos").value);
    const resultat = parseNum(document.getElementById("edit-resultat").value);
    const anciennete = parseNum(document.getElementById("edit-anciennete").value);

    const rendement = calcRendement(temps, honos, resultat, anciennete);
    const bonus = (1 + anciennete * 0.02).toFixed(2);

    document.getElementById("edit-renta-info").textContent =
`Caractéristiques :
- Temps passé : ${temps} h
- Honoraires cpta : ${honos.toFixed(2)} €
- Résultat R : ${resultat.toFixed(2)} €
- Ancienneté : ${anciennete} ans

Calcul du rendement :
((Honoraires cpta + Résultat R) / Temps passé) × (1 + Ancienneté × 2%)
((${honos.toFixed(2)} + ${resultat.toFixed(2)}) / ${temps || 0}) × ${bonus}
= ${rendement.toFixed(2)}`;
}

function openRentaEditor(id) {
    const client = clientsData.find(c => String(c.id) === String(id));
    if (!client) return;

    editingClientId = id;

    document.getElementById("edit-renta-title").textContent =
        `Modifier rendement - ${client["nom client"] || "Client"}`;

    document.getElementById("edit-temps-passe").value = parseNum(client["temps passé"]);
    document.getElementById("edit-honos").value = parseNum(client["honoraires cpta"]);
    document.getElementById("edit-resultat").value = parseNum(client["resultat R"]);
    document.getElementById("edit-anciennete").value = parseNum(client["ancienneté"]);

    refreshRentaInfo();
    document.getElementById("edit-renta-dialog").showModal();
}

function closeRentaModal() {
    document.getElementById("edit-renta-dialog").close();
    editingClientId = null;
}

function saveRentaEdit() {
    const client = clientsData.find(c => String(c.id) === String(editingClientId));
    if (!client) return;

    client["temps passé"] = parseNum(document.getElementById("edit-temps-passe").value);
    client["honoraires cpta"] = parseNum(document.getElementById("edit-honos").value);
    client["resultat R"] = parseNum(document.getElementById("edit-resultat").value);
    client["ancienneté"] = parseNum(document.getElementById("edit-anciennete").value);

    const rendement = calcRendement(
        client["temps passé"],
        client["honoraires cpta"],
        client["resultat R"],
        client["ancienneté"]
    );

    // Conservé pour compatibilité avec getRentabiliteScore
    client["rentabilite"] = rendement;

    closeRentaModal();
    displayClients(clientsData);
}

["edit-temps-passe", "edit-honos", "edit-resultat", "edit-anciennete"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener("input", refreshRentaInfo);
});

/* 🔥 EXISTANT */
function checkAnniversaires(data) {
    const today = new Date();
    const j = String(today.getDate()).padStart(2, '0');
    const m = String(today.getMonth() + 1).padStart(2, '0');

    const annivs = data.filter(c => {
        if (!c["anniversaire"]) return false;
        const d = new Date(c["anniversaire"]);
        return String(d.getDate()).padStart(2, '0') === j &&
               String(d.getMonth() + 1).padStart(2, '0') === m;
    });

    if (annivs.length > 0) {
        const div = document.getElementById("alert-anniv");
        div.style.display = "block";
        div.innerHTML = "🎂 Anniversaire aujourd’hui : " +
            annivs.map(a => a["nom client"]).join(", ");
    }
}

/* 🔥 FILTRES (inchangé) */
let filtersConfig = [
    { field: "collaborateur", label: "Collaborateur" },
    { field: "structure", label: "Structure" },
    { field: "activite R", label: "Activité" },
    { field: "assistant", label: "Assistant" },
    { field: "date de cloture", label: "Date de clôture" }
];

function buildFilters() {
    const container = document.getElementById("filters");
    container.innerHTML = "";

    filtersConfig.forEach(f => {
        const values = [...new Set(clientsData.map(c => c[f.field]).filter(Boolean))].sort();

        const group = document.createElement("div");
        group.className = "filter-group";

        group.innerHTML = `
            <strong>${f.label}</strong>
            <input type="text" placeholder="Rechercher..." data-field="${f.field}">
            <div class="checkbox-list" id="list-${f.field}"></div>
        `;

        container.appendChild(group);
        renderCheckboxList(f.field, values);

        group.querySelector("input").addEventListener("input", (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = values.filter(v => v.toLowerCase().includes(val));
            renderCheckboxList(f.field, filtered);
        });
    });
}

function renderCheckboxList(field, values) {
    const container = document.getElementById("list-" + field);
    container.innerHTML = "";

    values.forEach(val => {
        container.innerHTML += `
            <label>
                <input type="checkbox" value="${val}" data-field="${field}">
                ${val}
            </label>
        `;
    });

    container.querySelectorAll("input").forEach(cb => {
        cb.addEventListener("change", applyFilters);
    });
}

function applyFilters() {
    const checkboxes = document.querySelectorAll("input[type=checkbox]:checked");

    const filters = {};
    checkboxes.forEach(cb => {
        if (!filters[cb.dataset.field]) filters[cb.dataset.field] = [];
        filters[cb.dataset.field].push(cb.value);
    });

    const filtered = clientsData.filter(c =>
        Object.keys(filters).every(field =>
            filters[field].includes(c[field])
        )
    );

    displayClients(filtered);
}

/* 🔥 LOAD */
async function loadClients() {
    clientsData = await fetchClients();

    buildFilters();
    displayClients(clientsData);
    checkAnniversaires(clientsData);
}

function displayClients(data) {

    updateDashboard(data);

    const table = document.getElementById("clients-table");
    table.innerHTML = "";

    if (!data.length) {
        table.innerHTML = "<tr><td colspan='13'>Aucun résultat</td></tr>";
        return;
    }

    data.forEach(c => {

        const anciennete = parseFloat(c["ancienneté"]) || 0;
        const score = getRentabiliteScore(c["rentabilite"]);

        table.innerHTML += `
        <tr onclick="viewClient('${c.id}')">

            <td>${c["code client"] || ""}</td>
            <td><strong>${c["nom client"] || ""}</strong></td>
            <td>${c["date de cloture"] || ""}</td>
            <td>${c["structure"] || ""}</td>

            <td>
                ${anciennete}
                ${anciennete < 1 ? '<span class="alert">⚠️</span><span class="alert-badge">Nouveau</span>' : ''}
            </td>

            <td>${c["honoraires cpta"] || ""}</td>
            <td>${c["collaborateur"] || ""}</td>
            <td>${c["assistant"] || ""}</td>

            <td>${c["CA R"] || ""}</td>
            <td>${c["resultat R"] || ""}</td>
            <td>${c["activite R"] || ""}</td>

            <td>
                <button
                    class="renta-click"
                    style="color:${getColor(score)};"
                    onclick="event.stopPropagation(); openRentaEditor('${c.id}')"
                >
                    ${score.toFixed(1)}/10
                </button>
            </td>

            <td>
                <button class="btn" onclick="event.stopPropagation(); viewClient('${c.id}')">
                    Voir
                </button>
            </td>

        </tr>`;
    });
}

/* 🔥 TRI */
function sortByRentabilite() {
    const sorted = [...clientsData].sort((a, b) =>
        (parseFloat(b["rentabilite"]) || 0) -
        (parseFloat(a["rentabilite"]) || 0)
    );
    displayClients(sorted);
}

/* 🔥 FILTRE RENTABILITE */
document.getElementById("filter-renta").addEventListener("input", function(e) {
    const min = parseFloat(e.target.value) || 0;

    const filtered = clientsData.filter(c => {
        const score = getRentabiliteScore(c["rentabilite"]);
        return score >= min;
    });

    displayClients(filtered);
});

/* 🔎 SEARCH */
document.getElementById("search").addEventListener("input", function(e) {
    const value = e.target.value.toLowerCase();

    const filtered = clientsData.filter(c =>
        (c["nom client"] || "").toLowerCase().includes(value)
    );

    displayClients(filtered);
});

function sortByHonos() {
    const sorted = [...clientsData].sort((a, b) =>
        (parseFloat(b["honoraires cpta"]) || 0) -
        (parseFloat(a["honoraires cpta"]) || 0)
    );
    displayClients(sorted);
}

function sortByCA() {
    const sorted = [...clientsData].sort((a, b) =>
        (parseFloat(b["CA R"]) || 0) -
        (parseFloat(a["CA R"]) || 0)
    );
    displayClients(sorted);
}

function sortByResultat() {
    const sorted = [...clientsData].sort((a, b) =>
        (parseFloat(b["resultat R"]) || 0) -
        (parseFloat(a["resultat R"]) || 0)
    );
    displayClients(sorted);
}

function viewClient(id) {
    window.location.href = "client.html?id=" + id;
}

function updateDashboard(data) {
    const total = data.length;

    const totalHonos = data.reduce((sum, c) => {
        return sum + (parseFloat(c["honoraires cpta"]) || 0);
    }, 0);

    const avg = total ? totalHonos / total : 0;

    document.getElementById("total-clients").innerText = total;
    document.getElementById("avg-honos").innerText =
        new Intl.NumberFormat('fr-FR', {
            style: 'currency',
            currency: 'EUR'
        }).format(avg);
}

loadClients();
</script>

</body>
</html>
